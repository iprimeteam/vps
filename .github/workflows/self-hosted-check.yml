name: Self Hosted Check

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  verify-runner:
    runs-on:
      - self-hosted
      - linux
      - x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          echo "Runner name: $RUNNER_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Runner arch: $RUNNER_ARCH"
          whoami
          hostname
          pwd

      - name: Show system usage
        run: |
          df -h /
          free -h
          nproc
