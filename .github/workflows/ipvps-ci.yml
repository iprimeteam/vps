name: IPVPS CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ipvps-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-package:
    runs-on:
      - self-hosted
      - linux
      - x64
      - ipvps

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate extension manifest
        run: |
          node -e "const fs=require('fs'); const manifest=JSON.parse(fs.readFileSync('manifest.json','utf8')); if (manifest.manifest_version !== 3) throw new Error('manifest_version must be 3'); if (!manifest.background || manifest.background.service_worker !== 'background.js') throw new Error('background.service_worker must be background.js'); console.log('Manifest OK:', manifest.name, manifest.version);"

      - name: Check JavaScript syntax
        run: |
          node --check background.js
          node --check content.js
          node --check page-hook.js
          node --check spin-parser.js
          node --check terabox_docs_bundle.js
          node --check terabox_index.js

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-gdrive.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-gdrive.txt

      - name: Check Python script syntax
        run: |
          python -m py_compile gdrive_test.py

      - name: Package extension bundle
        run: |
          rm -rf dist
          mkdir -p dist
          zip -r dist/slot-ai-detector.zip manifest.json background.js content.js page-hook.js spin-parser.js terabox_docs.html terabox_docs_bundle.js terabox_index.js

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: slot-ai-detector
          path: dist/slot-ai-detector.zip
